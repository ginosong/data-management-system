spring.application.name=data-management-system-backend
server.port=8080
spring.profiles.active=mysql
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.locations=classpath:db/migration
app.security.jwt.secret=${JWT_SECRET:DataManagementSystemJwtSecretKey2026!1234567890}
app.security.jwt.access-token-minutes=120
app.security.jwt.refresh-token-days=7
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
